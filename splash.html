<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ===== SLIDESHOW ===== */
.slideshow {
  position: fixed;
  width: 100%;
  height: 100vh;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  animation: fade 12s infinite;
}

.slide:nth-child(1) {
  background-image: url('slide1.jpg');
  animation-delay: 0s;
}

.slide:nth-child(2) {
  background-image: url('slide2.jpg');
  animation-delay: 4s;
}

.slide:nth-child(3) {
  background-image: url('slide3.jpg');
  animation-delay: 8s;
}

@keyframes fade {
  0% {opacity: 0;}
  8% {opacity: 1;}
  25% {opacity: 1;}
  33% {opacity: 0;}
  100% {opacity: 0;}
}

/* ===== OVERLAY ===== */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* ===== CONTENT ===== */
.content {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.logo {
  width: 120px;
  margin-bottom: 20px;
  animation: pulse 2s infinite;
}

h1 {
  font-size: 28px;
  letter-spacing: 2px;
}

.bar {
  width: 220px;
  height: 4px;
  background: rgba(255,255,255,0.3);
  margin-top: 20px;
  border-radius: 10px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  width: 0%;
  background: #00ff88;
  animation: loading 5s linear forwards;
}

@keyframes loading {
  to { width: 100%; }
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.08);}
  100% {transform: scale(1);}
}
</style>

<script>
setTimeout(function(){
   window.location.href = "index.html";
}, 5000); // pindah setelah 5 detik
</script>

</head>
<body>

<div class="slideshow">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<div class="overlay"></div>

<div class="content">
  <img src="logo.png" class="logo" alt="Logo">
  <h1>SISTEM INFORMASI</h1>
  <div class="bar"><span></span></div>
</div>

</body>
</html>
